services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: acds-backend
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8010:8010"
    environment:
      - MONGO_URI=mongodb://acds:acds123@mongo:27017/acds?authSource=admin
      - DB_NAME=acds
      - JWT_SECRET_KEY=acds-production-secret-key-2024
      - LOG_LEVEL=INFO
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - acds-network

  #frontend:
   # build:
      #context: ./frontend
      #dockerfile: Dockerfile
    #container_name: acds-frontend
    #volumes:
    #  - ./frontend:/app
    #  - /app/node_modules
    #ports:
    #  - "5173:5173"
    #environment:
    #  - VITE_API_URL=http://localhost:8010
    #depends_on:
    ##  - backend
    #restart: unless-stopped
    #networks:
    #  - acds-network

  mongo:
    image: mongo:7.0
    container_name: acds-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: acds
      MONGO_INITDB_ROOT_PASSWORD: acds123
      MONGO_INITDB_DATABASE: acds
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./data/mongo-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - acds-network

  mongo-express:
    image: mongo-express:latest
    container_name: acds-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: acds
      ME_CONFIG_MONGODB_ADMINPASSWORD: acds123
      ME_CONFIG_MONGODB_URL: mongodb://acds:acds123@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - acds-network

volumes:
  mongodata:

networks:
  acds-network:
    driver: bridge 
